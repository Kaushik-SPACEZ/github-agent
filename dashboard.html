<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Quality Monitor - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .status-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #10b981;
        }
        
        .status-indicator.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .stat-box h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-box .value {
            color: #667eea;
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .history-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .history-card h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .history-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        .history-item .time {
            color: #999;
            font-size: 0.9em;
        }
        
        .history-item .repo {
            color: #333;
            font-weight: bold;
            margin: 5px 0;
        }
        
        .history-item .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .history-item .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .history-item .status.failed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Code Quality Monitor</h1>
            <p>Autonomous AI Agent Dashboard</p>
        </div>
        
        <div class="status-card">
            <h2>
                <span class="status-indicator" id="statusIndicator"></span>
                Server Status: <span id="serverStatus">Checking...</span>
            </h2>
            <p style="margin-top: 10px; color: #666;">
                Webhook URL: <code id="webhookUrl">http://localhost:8000/webhook/github</code>
            </p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <h3>Total Analyses</h3>
                <div class="value" id="totalAnalyses">-</div>
            </div>
            <div class="stat-box">
                <h3>Success Rate</h3>
                <div class="value" id="successRate">-</div>
            </div>
            <div class="stat-box">
                <h3>Last Analysis</h3>
                <div class="value" style="font-size: 1.2em;" id="lastAnalysis">-</div>
            </div>
        </div>
        
        <div class="history-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Recent Analyses</h2>
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            </div>
            <div id="historyContainer">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function checkServerStatus() {
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                
                document.getElementById('serverStatus').textContent = 'Online';
                document.getElementById('statusIndicator').className = 'status-indicator online';
                return true;
            } catch (error) {
                document.getElementById('serverStatus').textContent = 'Offline';
                document.getElementById('statusIndicator').className = 'status-indicator offline';
                return false;
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history`);
                const data = await response.json();
                
                const total = data.total || 0;
                const analyses = data.analyses || [];
                
                // Update stats
                document.getElementById('totalAnalyses').textContent = total;
                
                if (analyses.length > 0) {
                    const successCount = analyses.filter(a => a.success).length;
                    const successRate = ((successCount / analyses.length) * 100).toFixed(0);
                    document.getElementById('successRate').textContent = successRate + '%';
                    
                    const lastTime = new Date(analyses[analyses.length - 1].timestamp);
                    document.getElementById('lastAnalysis').textContent = lastTime.toLocaleTimeString();
                } else {
                    document.getElementById('successRate').textContent = 'N/A';
                    document.getElementById('lastAnalysis').textContent = 'Never';
                }
                
                // Display history
                const container = document.getElementById('historyContainer');
                
                if (analyses.length === 0) {
                    container.innerHTML = '<div class="loading">No analyses yet. Push code to trigger!</div>';
                    return;
                }
                
                container.innerHTML = analyses.reverse().map(item => {
                    const time = new Date(item.timestamp).toLocaleString();
                    const statusClass = item.success ? 'success' : 'failed';
                    const statusText = item.success ? '✅ Success' : '❌ Failed';
                    
                    return `
                        <div class="history-item">
                            <div class="time">${time}</div>
                            <div class="repo">${item.repo_url}</div>
                            <div>
                                <span class="status ${statusClass}">${statusText}</span>
                                ${item.commit_sha ? `<span style="color: #666; margin-left: 10px;">Commit: ${item.commit_sha.substring(0, 8)}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                document.getElementById('historyContainer').innerHTML = 
                    '<div class="error">⚠️ Could not load history. Make sure the webhook server is running.</div>';
            }
        }
        
        async function loadData() {
            await checkServerStatus();
            await loadHistory();
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 seconds
        setInterval(loadData, 5000);
    </script>
</body>
</html>
